name: Build Project

on:
  push:
    branches:
      - develop
jobs:
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.16.0

      - name: Install Packages
        run:
          npm install

      - name: Build Angular
        run:
          npm run build
          
